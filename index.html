<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Real-time Object Detection</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #000; overflow: hidden; }
    #video-container { position: relative; width: 100vw; height: 100vh; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    #info { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; pointer-events: none; }
  </style>
</head>
<body>

  <div id="video-container">
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>
    <div id="info">カメラを許可してください</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.2"></script>

  <script type="module">
    import { ObjectDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.2";

    const video = document.getElementById("webcam");
    const canvasElement = document.getElementById("output_canvas");
    const canvasCtx = canvasElement.getContext("2d");
    const info = document.getElementById("info");
    let objectDetector;

    // 1. AIモデルの初期化
    async function initDetector() {
      const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.2/wasm");
      objectDetector = await ObjectDetector.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: `https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite`,
          delegate: "GPU"
        },
        scoreThreshold: 0.5, // 50%以上の確信度で表示
        runningMode: "VIDEO"
      });
      info.innerText = "準備完了！カメラを向けてください";
      startCamera();
    }

    // 2. カメラの起動
    async function startCamera() {
      const constraints = { video: { facingMode: "environment" } }; // 背面カメラ優先
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
      video.addEventListener("loadeddata", predictWebcam);
    }

    // 3. リアルタイム予測ループ
    async function predictWebcam() {
      canvasElement.width = video.videoWidth;
      canvasElement.height = video.videoHeight;

      const results = await objectDetector.detectForVideo(video, performance.now());
      
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      // 検出結果の描画
      results.detections.forEach(detection => {
        const { originX, originY, width, height } = detection.boundingBox;
        const label = detection.categories[0].categoryName;
        const score = Math.round(detection.categories[0].score * 100);

        // 枠の描画
        canvasCtx.strokeStyle = "#00FF00";
        canvasCtx.lineWidth = 4;
        canvasCtx.strokeRect(originX, originY, width, height);

        // ラベルの描画
        canvasCtx.fillStyle = "#00FF00";
        canvasCtx.font = "24px Arial";
        canvasCtx.fillText(`${label} (${score}%)`, originX, originY > 30 ? originY - 10 : 30);
      });

      window.requestAnimationFrame(predictWebcam);
    }

    initDetector();
  </script>
</body>
</html>
